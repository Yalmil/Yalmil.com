<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tu IP</title>

    <style>
        body {
            color: black
        }
        h1 {
            color: white
        }
    </style>
</head>
<body>
    <script>
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.body.innerText = 'Tu IP: ' + data.ip;
            })
            .catch(() => {
                document.body.innerText = 'Tu IP: No se pudo obtener';
            });
    </script>
</body>
</html>
