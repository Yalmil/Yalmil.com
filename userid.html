<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigue tú userID</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e24 0%, #2c3e50 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace, system-ui;
            color: #ecf0f1;
        }
        .card {
            background: rgba(20, 25, 30, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #3a5f7a;
            border-radius: 32px;
            padding: 2.5rem 3rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #1e2f3a inset;
            max-width: 650px;
            width: 90%;
        }
        h1 {
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 2rem;
            color: #bdd4e0;
            border-bottom: 1px dashed #3a6d8c;
            padding-bottom: 0.8rem;
        }
        h1 i {
            font-style: normal;
            font-size: 1.9rem;
            margin-right: 8px;
        }
        .ip-container {
            background: #0f1a1f;
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            margin: 25px 0 15px;
            border: 1px solid #2e5770;
            box-shadow: inset 0 6px 8px rgba(0,0,0,0.5), 0 4px 0 #0b1419;
        }
        #ip-display {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            color: #7effb7;
            text-shadow: 0 0 18px #1eff6e80, 0 0 4px #a0ffc0;
            margin: 0;
            line-height: 1.3;
            word-break: break-all;
        }
        .ip-label {
            font-size: 1.2rem;
            font-weight: 500;
            color: #9bb7c9;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0;
        }
        .status-area {
            min-height: 32px;
            margin: 12px 0 5px;
            font-family: monospace;
            color: #b3d9ff;
            font-size: 1rem;
        }
        button {
            background: #263b47;
            border: none;
            border-bottom: 4px solid #0e1e28;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 14px 28px;
            margin: 20px 0 10px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 #0f1a20;
            border: 1px solid #40748e;
        }
        button:hover {
            background: #2f5063;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0f1a20;
            border-color: #5b9abd;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0f1a20;
        }
        .note {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 25px;
            color: #a6c5d9;
        }
        .footer-note {
            border-top: 1px solid #2a4759;
            padding-top: 15px;
            margin-top: 5px;
            font-size: 0.85rem;
        }
        .error-msg {
            color: #ffa098;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="ip-label">TU USERID IPV4</div>
    <div class="ip-container">
        <div id="ip-display">—.—.—.—</div>
    </div>
    <div id="status" class="status-area">⏳ Detectando UserID...</div>
    
    <div class="footer-note">
        ⚡ SessionID: 839.<br>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const ipElement = document.getElementById('ip-display');
        const statusElement = document.getElementById('status');
        const refreshBtn = document.getElementById('refresh-btn');

        // Lista de servicios que devuelven IP en texto plano (prioridad a IPv4)
        const IP_SERVICES = [
            {
                name: 'ipify (IPv4)',
                url: 'https://api.ipify.org?format=json',
                extract: (data) => data.ip,
                type: 'json'
            },
            {
                name: 'MyIP.com',
                url: 'https://api.myip.com',
                extract: (data) => data.ip,
                type: 'json'
            },
            {
                name: 'IP-API (fallback)',
                url: 'https://ipapi.co/ip/',
                extract: (text) => text.trim(),
                type: 'text'
            },
            {
                name: 'icanhazip',
                url: 'https://icanhazip.com',
                extract: (text) => text.trim(),
                type: 'text'
            },
            {
                name: 'AWS checkip',
                url: 'https://checkip.amazonaws.com',
                extract: (text) => text.trim(),
                type: 'text'
            }
        ];

        // Función auxiliar para pausa entre intentos
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Función robusta para obtener IP usando fetch con timeout
        async function fetchWithTimeout(resource, options = {}, timeout = 4000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(resource, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        // Intenta obtener IP desde un servicio específico
        async function tryGetIP(service) {
            try {
                const response = await fetchWithTimeout(service.url, {}, 3800);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                let rawData;
                if (service.type === 'json') {
                    rawData = await response.json();
                } else {
                    rawData = await response.text();
                }

                const ip = service.extract(rawData);
                
                // Validación mínima de formato IPv4 (más flexible para IPv6 si aparece, pero preferimos v4)
                const ipv4Regex = /^(\d{1,3}\.){3}\d{1,3}$/;
                const ipv6Regex = /^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^([0-9a-fA-F]{1,4}:){1,7}:|^::1$|^([0-9a-fA-F]{1,4}:){6}([0-9a-fA-F]{1,4})?$/;
                
                if (ip && (ipv4Regex.test(ip) || ipv6Regex.test(ip))) {
                    return { success: true, ip: ip, source: service.name };
                } else {
                    throw new Error(`Formato IP inválido: ${ip}`);
                }
            } catch (err) {
                // Ignoramos errores específicos de Abort (timeout) y otros
                console.warn(`⚠️ ${service.name} falló:`, err.message);
                return { success: false, error: err.message, source: service.name };
            }
        }

        // Función principal: itera servicios hasta obtener IP
        async function fetchRealIP() {
            ipElement.textContent = '⏳ ...';
            statusElement.innerHTML = '🔍 Buscando IP pública real (prioridad IPv4)...';
            
            for (let i = 0; i < IP_SERVICES.length; i++) {
                const service = IP_SERVICES[i];
                statusElement.innerHTML = `🌐 Probando ${service.name}...`;
                
                const result = await tryGetIP(service);
                
                if (result.success) {
                    // Éxito: mostrar IP
                    ipElement.textContent = result.ip;
                    statusElement.innerHTML = `✅ IP REAL OBTENIDA · Fuente: ${result.source}`;
                    // Pequeño extra: si es IPv6 mostrar advertencia (para juegos de tanques suele preferirse IPv4)
                    if (result.ip.includes(':')) {
                        statusElement.innerHTML += `<br><span style="font-size:0.8rem; color:#f1c40f;">⚠️ Es una IPv6. Algunos juegos/servidores requieren IPv4.</span>`;
                    }
                    return;
                } else {
                    // Si no es el último, continuamos; si es el último mostramos error
                    if (i === IP_SERVICES.length - 1) {
                        // Último servicio falló
                        ipElement.textContent = 'ERROR';
                        statusElement.innerHTML = `❌ No se pudo obtener IP. Revisa tu conexión.`;
                    } else {
                        // Esperamos un poco para no saturar (opcional)
                        await delay(150);
                    }
                }
            }
            
            // Si salimos del bucle sin éxito
            ipElement.textContent = '?.?.?.?';
            statusElement.innerHTML = '⚠️ Todos los servicios fallaron. ¿Conexión a internet?';
        }

        // Evento para el botón
        refreshBtn.addEventListener('click', () => {
            fetchRealIP();
        });

        // Al cargar la página, obtener IP automáticamente
        window.addEventListener('load', () => {
            fetchRealIP();
        });

        // Por si hay algún error no capturado (safety)
        window.addEventListener('unhandledrejection', (event) => {
            console.warn('Unhandled Rejection:', event.reason);
            statusElement.innerHTML = '⚠️ Error inesperado. Intenta actualizar.';
            ipElement.textContent = '?.?.?.?';
        });
    })();
</script>
</body>
</html>
